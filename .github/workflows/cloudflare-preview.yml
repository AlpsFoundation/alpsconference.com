name: Cloudflare Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run generate-types

      - name: Run newsletter tests
        run: bun run test:newsletter

      - name: Build project
        run: bun run build

      - name: Upload preview Worker version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }} --message "Preview deployment for PR #${{ github.event.pull_request.number }}"

      - name: Extract preview alias URL
        id: preview-url
        env:
          DEPLOYMENT_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          alias_url="$(printf '%s\n' "$DEPLOYMENT_OUTPUT" | sed -n 's/^Version Preview Alias URL:[[:space:]]*//p' | tail -n 1)"
          versioned_url="$(printf '%s\n' "$DEPLOYMENT_OUTPUT" | sed -n 's/^Version Preview URL:[[:space:]]*//p' | tail -n 1)"
          resolved_url="${alias_url:-$versioned_url}"
          echo "preview_url=$resolved_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on pull request
        if: steps.preview-url.outputs.preview_url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.preview_url }}
        with:
          script: |
            const body = [
              "<!-- cloudflare-preview -->",
              "### Cloudflare preview deployment",
              "",
              `- Preview URL: ${process.env.PREVIEW_URL}`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" &&
              typeof comment.body === "string" &&
              comment.body.includes("<!-- cloudflare-preview -->")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
