# Posts to #bots after Cloudflare’s production build for main succeeds (GitHub check_run).
# Not tied to git push timing, so Slack only fires when Cloudflare reports success.
#
# Secrets: SLACK_BOT_TOKEN (chat:write; invite the bot to #bots or use a channel ID).
# Optional vars: PRODUCTION_SITE_URL, SLACK_BOTS_CHANNEL, CLOUDFLARE_CHECK_NAME_SUBSTR
#   (substring of the Cloudflare check run name; default "Workers Builds" — set for Pages-only names).

name: Slack notify — main merge

on:
  check_run:
    types: [completed]

permissions:
  contents: read

jobs:
  notify-bots:
    if: >
      github.event.check_run.status == 'completed' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.check_suite.head_branch == 'main' &&
      (github.event.check_run.app.slug == 'cloudflare-workers-and-pages' ||
       github.event.check_run.app.slug == 'cloudflare-pages')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post merge summary to Slack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}
          SLACK_BOTS_CHANNEL: ${{ vars.SLACK_BOTS_CHANNEL }}
          CLOUDFLARE_CHECK_NAME_SUBSTR: ${{ vars.CLOUDFLARE_CHECK_NAME_SUBSTR }}
        run: node scripts/slack-github-notifications.mjs main-merge
